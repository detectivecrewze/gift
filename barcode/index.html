<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Generator — Arcade Edition Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
        }

        .text-serif {
            font-family: 'Cormorant Garamond', serif;
        }
    </style>
</head>

<body class="bg-[#fcfaf7] min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full text-center py-8">

        <!-- Header -->
        <h2 class="text-serif italic text-3xl mb-2 text-[#1a1a1a]">QR Generator</h2>
        <p class="text-[10px] uppercase tracking-[0.3em] text-gray-500 font-bold mb-8">Arcade Edition Premium</p>

        <!-- Input URL -->
        <div class="mb-6 text-left">
            <label class="text-[9px] uppercase tracking-[0.2em] font-bold text-gray-500 block mb-2">URL Kado</label>
            <input id="input-url" type="text" placeholder="https://kado-lisa.vercel.app"
                class="w-full border border-gray-200 rounded-lg px-4 py-3 text-sm text-gray-700 focus:outline-none focus:border-[#d4a373] transition-colors font-mono"
                autocomplete="off" />
        </div>

        <!-- Generate Button -->
        <button id="btn-generate" onclick="generateQR()"
            class="w-full mb-8 py-3.5 text-[9px] uppercase tracking-[0.2em] font-bold rounded-lg transition-all"
            style="background: #1a1a1a; color: white;">
            Generate QR Code
        </button>

        <!-- Result Section (hidden initially) -->
        <div id="result-section" class="hidden">

            <!-- ═══ Aesthetic QR Code Polaroid Card ═══ -->
            <div class="flex justify-center mb-8">
                <div id="qr-export-container"
                    style="background: linear-gradient(160deg, #fffaf5 0%, #fff8f0 50%, #f5efe6 100%); padding: 28px 24px 20px; border-radius: 16px; border: 1px solid rgba(212,174,106,0.2); box-shadow: 0 20px 50px -15px rgba(0,0,0,0.12), 0 4px 12px rgba(212,174,106,0.08); position: relative; max-width: 220px; width: 100%;">
                    <!-- Top accent line -->
                    <div
                        style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 40px; height: 3px; background: linear-gradient(90deg, transparent, #d4a373, transparent); border-radius: 0 0 4px 4px;">
                    </div>
                    <!-- Title -->
                    <p
                        style="font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 22px; color: #1a1a1a; margin-bottom: 2px; letter-spacing: -0.02em;">
                        For You</p>
                    <p
                        style="font-size: 7px; text-transform: uppercase; letter-spacing: 0.35em; color: #d4a373; font-weight: 600; margin-bottom: 16px;">
                        ✦ scan to open your gift ✦</p>
                    <!-- QR Code -->
                    <div id="qr-code-box"
                        style="background: white; border-radius: 10px; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 148px; width: 148px; margin: 0 auto; border: 1px solid rgba(0,0,0,0.04); box-shadow: inset 0 1px 3px rgba(0,0,0,0.04);">
                    </div>
                    <!-- Bottom branding -->
                    <p
                        style="font-size: 6px; text-transform: uppercase; letter-spacing: 0.4em; color: #c4b49a; margin-top: 14px; text-align: center;">
                        arcade edition</p>
                </div>
            </div>

            <!-- Download Button -->
            <button id="btn-download-qr" onclick="downloadQR()"
                class="w-full mb-6 py-3.5 text-[9px] uppercase tracking-[0.2em] font-bold rounded-lg transition-all flex items-center justify-center gap-2"
                style="background: linear-gradient(135deg, #d4a373 0%, #c4956a 100%); color: white; border: none; box-shadow: 0 4px 14px rgba(212,174,106,0.35);">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                Download Barcode
            </button>

            <!-- URL Display -->
            <div class="bg-white border border-gray-100 p-4 mb-6 rounded-lg">
                <span id="url-display"
                    class="text-[10px] font-mono text-gray-600 font-bold break-all select-all"></span>
            </div>

            <!-- Copy + WA -->
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button onclick="copyLink()" id="btn-copy"
                    class="text-[9px] uppercase tracking-widest font-bold border border-black py-3.5 rounded-lg hover:bg-black hover:text-white transition-all">
                    Salin Link
                </button>
                <a id="btn-whatsapp" href="#" target="_blank"
                    class="text-[9px] uppercase tracking-widest font-bold bg-green-500 text-white py-3.5 rounded-lg flex items-center justify-center hover:bg-green-600 transition-all">
                    WhatsApp
                </a>
            </div>

            <!-- View Gift -->
            <a id="btn-view" href="#" target="_blank"
                class="w-full inline-flex justify-center items-center py-4 text-[10px] uppercase tracking-widest font-extrabold bg-[#1a1a1a] text-white rounded-lg hover:bg-black transition-all shadow-md">
                Lihat Hasil
            </a>

        </div>
    </div>

    <script>
        let currentUrl = '';

        function generateQR() {
            const url = document.getElementById('input-url').value.trim();
            if (!url) {
                alert('Masukkan URL kado terlebih dahulu.');
                return;
            }

            currentUrl = url;

            // Clear previous QR
            const box = document.getElementById('qr-code-box');
            box.innerHTML = '';

            // Generate QR
            new QRCode(box, {
                text: url,
                width: 128,
                height: 128,
                colorDark: '#1a1a1a',
                colorLight: '#ffffff',
                correctLevel: QRCode.CorrectLevel.M
            });

            setTimeout(() => {
                const qrImg = box.querySelector('img');
                const qrCanvas = box.querySelector('canvas');
                if (qrImg) {
                    qrImg.style.margin = '0 auto';
                    qrImg.style.display = 'block';
                    qrImg.style.borderRadius = '4px';
                }
                if (qrCanvas) qrCanvas.style.display = 'none';
            }, 100);

            // Update links
            document.getElementById('url-display').textContent = url;
            document.getElementById('btn-view').href = url;
            document.getElementById('btn-whatsapp').href = `https://wa.me/?text=${encodeURIComponent('Untukmu, kenangan yang abadi. ✨\n\n' + url)}`;

            // Show result
            document.getElementById('result-section').classList.remove('hidden');
        }

        async function downloadQR() {
            const exportNode = document.getElementById('qr-export-container');
            const btn = document.getElementById('btn-download-qr');
            const originalHTML = btn.innerHTML;

            btn.innerHTML = '<span style="opacity:0.7">Memproses...</span>';
            btn.disabled = true;

            try {
                const canvas = await html2canvas(exportNode, {
                    scale: 3,
                    backgroundColor: '#fffaf5',
                    useCORS: true,
                    logging: false
                });

                const dataUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.download = `ArcadeEdition-QR-${Date.now()}.png`;
                a.href = dataUrl;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (err) {
                alert('Gagal download. Coba screenshot manual.');
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        }

        function copyLink() {
            if (!currentUrl) return;
            navigator.clipboard.writeText(currentUrl).then(() => {
                const btn = document.getElementById('btn-copy');
                btn.textContent = 'TERSALIN';
                setTimeout(() => btn.textContent = 'Salin Link', 2000);
            });
        }

        // Allow Enter key to generate
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('input-url').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') generateQR();
            });
        });
    </script>

</body>

</html>
