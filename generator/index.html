<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Generator | Arcade Edition</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Instrument+Serif:italic&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fcfaf7;
            background-image:
                radial-gradient(at 0% 0%, hsla(25, 100%, 98%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.05) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 1rem;
            flex-direction: column;
        }

        .italic-title {
            font-family: 'Instrument Serif', serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border-radius: 12px;
        }

        .btn-premium {
            background: #000;
            color: #fff;
            padding: 1.1rem 2rem;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-premium:hover {
            background: #222;
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
        }

        .grain-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            opacity: 0.05;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade {
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>

<body>
    <div class="grain-overlay"></div>

    <div class="max-w-md w-full p-6 text-center animate-fade">
        <h1 class="text-5xl italic-title mb-2 text-black">Studio Curator</h1>
        <p class="text-[10px] uppercase tracking-[0.4em] text-gray-500 mb-16">Arcade Edition — Limited</p>

        <!-- ── PASSWORD GATE (ACCESS TO GENERATOR) ── -->
        <div id="password-gate" class="glass-panel p-10 space-y-6">
            <h2 class="text-xl italic-title text-black">Locked Access</h2>
            <p class="text-[10px] uppercase tracking-widest text-gray-500">Masukkan Password Admin Arcade</p>
            <input id="input-gate-pass" type="password" placeholder="•••••"
                class="w-full text-center text-sm border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-all placeholder:text-gray-400 text-black">
            <button id="btn-unlock-gate" class="btn-premium w-full shadow-lg">Buka Akses</button>
            <p id="gate-error" class="text-[9px] text-rose-500 hidden font-bold">Password Salah</p>
        </div>

        <!-- ── MAIN CONTENT (GENERATOR) ── -->
        <div id="main-content" class="hidden space-y-8">
            <!-- 1. Create Project -->
            <div class="glass-panel p-10 space-y-8">
                <p class="text-[11px] text-black font-bold uppercase tracking-widest mb-4">Mulai Project Arcade Baru</p>

                <div class="space-y-4 text-left">
                    <label class="text-[9px] uppercase tracking-widest text-gray-500 font-bold block ml-1">Nama Project (Slug) <span class="text-rose-500">*wajib</span></label>
                    <input id="input-new-token" type="text" placeholder="contoh: kado-lisa"
                        class="w-full text-center text-sm border-b border-gray-300 bg-transparent py-3 focus:outline-none focus:border-black transition-all placeholder:text-gray-400 text-black">
                </div>

                <div class="space-y-4">
                    <div class="space-y-1 text-left">
                        <label class="text-[9px] uppercase tracking-widest text-gray-500 font-bold block ml-1">Studio Password (Editor)</label>
                        <input id="input-studio-pass" type="password" placeholder="••••••••"
                            class="w-full text-center text-sm border-b border-gray-300 bg-transparent py-2 focus:outline-none focus:border-black transition-all placeholder:text-gray-400 text-black">
                    </div>

                    <div class="space-y-1 text-left">
                        <label class="text-[9px] uppercase tracking-widest text-gray-500 font-bold block ml-1">Gift Password (Penerima)</label>
                        <input id="input-gift-pass" type="password" placeholder="••••••••"
                            class="w-full text-center text-sm border-b border-gray-300 bg-transparent py-2 focus:outline-none focus:border-black transition-all placeholder:text-gray-400 text-black">
                    </div>
                </div>
            </div>

            <button id="btn-create" class="btn-premium w-full shadow-lg mt-4">
                Buat Project Sekarang
            </button>
            <button id="btn-create-premium" class="w-full text-[10px] text-[#b58756] font-bold uppercase tracking-widest border border-[#d4a373]/30 py-4 hover:bg-[#cf9e6e]/10 transition-all rounded-sm mt-3">
                ✨ Buat Project Premium (VIP)
            </button>
        </div>

        <!-- Divider -->
        <div class="relative py-4">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t border-gray-200"></span></div>
            <div class="relative flex justify-center">
                <span class="bg-[#fcfaf7] px-4 text-[9px] text-gray-400 font-bold uppercase tracking-widest">Atau Lanjutkan</span>
            </div>
        </div>

        <!-- 2. Access Project -->
        <form id="form-access" class="glass-panel p-10 space-y-4">
            <input id="input-token" type="text" placeholder="Masukkan Kode Project..."
                class="w-full text-center text-sm border-b border-gray-400 bg-transparent py-3 focus:outline-none focus:border-black transition-all placeholder:text-gray-500 text-black font-medium">
            <button type="submit"
                class="w-full text-[10px] text-black font-bold uppercase tracking-widest border border-gray-300 py-4 hover:bg-white transition-all rounded-sm">
                Masuk ke Studio
            </button>
        </form>

        <p class="mt-12 text-[9px] text-gray-500 font-medium uppercase tracking-[0.2em]">© 2026 For You Always — Arcade Edition</p>
    </div>

    <script src="generator.js"></script>
</body>

</html>
