<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Quiz Room — Arcade Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Layer -->
  <div class="room-bg">
    <div class="scanline-overlay"></div>
    <div class="ambient-overlay"></div>
  </div>

  <!-- Pixel Particles -->
  <div id="pixel-particles"></div>

  <!-- ══════════════════════════════════════
       SCREEN: LOADING
  ══════════════════════════════════════ -->
  <div id="loading-screen" class="quiz-screen active">
    <div class="arcade-box loading-box">
      <div class="pixel-skull">✦</div>
      <p class="blink-text">LOADING...</p>
      <div class="pixel-bar">
        <div class="pixel-bar-fill" id="load-bar"></div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN: EMPTY (no quiz set up)
  ══════════════════════════════════════ -->
  <div id="empty-screen" class="quiz-screen">
    <div class="arcade-box center-box">
      <p class="pixel-title">NO DATA</p>
      <p class="pixel-sub">QUIZ BELUM DISIAPKAN</p>
      <p class="pixel-sub dim">KREATOR BELUM MENGISI PERTANYAAN</p>
    </div>
  </div>

  <!-- ══════════════════════════════════════
       SCREEN: QUIZ (playing)
  ══════════════════════════════════════ -->
  <div id="quiz-screen" class="quiz-screen">

    <!-- Top HUD Bar -->
    <div class="hud-bar">
      <div class="hud-left">
        <span class="hud-label">SKOR</span>
        <span class="hud-value" id="hud-score">000</span>
      </div>
      <div class="hud-center">
        <div class="progress-pips" id="progress-pips"></div>
      </div>
      <div class="hud-right">
        <span class="hud-label">SOAL</span>
        <span class="hud-value" id="hud-qnum">1/5</span>
      </div>
    </div>

    <!-- Question Panel (Arcade Monitor) -->
    <div class="arcade-monitor" id="question-card">
      <div class="monitor-inner">
        <!-- Corner decorations -->
        <span class="px-corner tl">┌</span>
        <span class="px-corner tr">┐</span>
        <span class="px-corner bl">└</span>
        <span class="px-corner br">┘</span>

        <p class="question-label">▶ PERTANYAAN</p>
        <p class="question-text" id="question-text">Loading...</p>
      </div>
      <!-- Feedback flash -->
      <div class="monitor-flash" id="monitor-flash"></div>
    </div>

    <!-- Answer Grid -->
    <div class="answer-grid" id="options-grid">
      <!-- Rendered by JS -->
    </div>

    <!-- Next Button -->
    <button class="pixel-btn next-btn hidden" id="next-btn">
      <span class="btn-text">NEXT ▶</span>
    </button>

  </div>

  <!-- ══════════════════════════════════════
       SCREEN: ENDING
  ══════════════════════════════════════ -->
  <div id="ending-screen" class="quiz-screen">
    <div class="arcade-box ending-box">
      <p class="pixel-title rainbow-text">GAME OVER</p>
      <div class="score-block">
        <p class="score-label">FINAL SCORE</p>
        <p class="big-score" id="final-score">5</p>
        <p class="score-out">/ <span id="total-q">5</span> CORRECT</p>
      </div>
      <div class="rank-badge" id="rank-badge">★ S RANK ★</div>
      <button class="pixel-btn" id="replay-btn">↺ PLAY AGAIN</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
