<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Message — Simple Aesthetic Letter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <!-- Soft Cottagecore Background -->
  <div class="room-bg">
    <div class="sunlight-rays"></div>
    <div class="dust-particles" id="dust-container"></div>
  </div>

  <div class="message-container">
    <!-- Clean Minimalist Stationery Letter -->
    <div class="simple-aesthetic-letter">
      <div class="letter-content">
        <div class="scroll-area">
          <p class="message-text">
            <span id="letter-text"></span><span class="writing-cursor" id="letter-cursor"></span>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
