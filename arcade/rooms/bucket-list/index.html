<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bucket List — Our Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@400;500&family=Playfair+Display:ital,wght@1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="room-bg">
    <div class="ambient-glow"></div>
    <div class="drifting-petals" id="petals"></div>
  </div>

  <div class="room-container">
    <div class="journal-book">

      <!-- Left decorative spine -->
      <div class="book-spine"></div>

      <!-- Journal content -->
      <div class="journal-inner">
        <div class="journal-header">
          <p class="header-eyebrow">our little</p>
          <h1 class="header-title">Bucket List</h1>
          <div class="header-rule">
            <span class="rule-line"></span>
            <span class="rule-ornament">✦</span>
            <span class="rule-line"></span>
          </div>
        </div>

        <div class="list-container" id="bucket-list">
          <div class="loading-state">Opening the journal...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
