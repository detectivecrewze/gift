<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Bucket List — The Attic Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
  <!-- Cozy Attic Background -->
  <div class="room-bg">
    <div class="ambient-glow"></div>
    <div class="drifting-petals" id="petals"></div>
  </div>

  <div class="bucket-container">
    <!-- Clean Elegant Journal Page -->
    <div class="journal-page">
      <div class="journal-content">
        <h1 class="journal-title">Our Bucket List</h1>
        <div class="list-container" id="bucket-list">
          <!-- Items injected by script -->
          <div class="loading-state">Opening the journal...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=2"></script>
</body>
</html>
