<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Things I Love About You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- Room Background -->
  <div class="room-bg">
    <div class="ambient-overlay"></div>
    <div class="floating-dust"></div>
    <div class="background-effects">
      <div id="petal-container"></div>
    </div>
  </div>

  <!-- Main Container — Centered -->
  <div class="room-container">
    <div class="journal-page">
      <div class="journal-content">
        <h1 class="journal-title">Things I Love About You</h1>
        <div class="title-divider"></div>
        <div class="list-container" id="love-list">
          <div class="loading-state">Counting the reasons...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
