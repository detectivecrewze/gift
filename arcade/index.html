<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>For You, Always. — Arcade Edition</title>
  <meta name="description" content="A special pixel-art gift, crafted just for you.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=Dancing+Script:wght@700&family=Caveat:wght@400;700&family=Press+Start+2P&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/favicons/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="assets/favicons/favicon.svg" />
  <link rel="shortcut icon" href="assets/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="assets/favicons/site.webmanifest" />

  <!-- Preload Critical Assets -->
  <link rel="preload" as="image" href="assets/bg_ghibli.webp">
</head>

<body>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SCREEN 1: LOADING                          -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="loading-screen" class="screen active">

    <!-- Floating pixel lanterns -->
    <div class="lantern-layer" aria-hidden="true">
      <div class="lantern lantern-1"></div>
      <div class="lantern lantern-2"></div>
      <div class="lantern lantern-3"></div>
      <div class="lantern lantern-4"></div>
    </div>

    <!-- Sparkle / dust particles -->
    <div class="loading-dust" id="loading-dust" aria-hidden="true"></div>

    <!-- Centre: Logo mark + text -->
    <div class="loading-hero">
      <div class="loading-emblem" aria-hidden="true">
        <div class="emblem-ring emblem-ring-outer"></div>
        <div class="emblem-ring emblem-ring-inner"></div>
        <div class="emblem-star">✦</div>
      </div>
      <div class="loading-text">
        <span class="loading-for">For </span>
        <span class="loading-name" id="loading-name">you</span>
        <span class="loading-comma">, Always.</span>
      </div>
    </div>

    <div class="loading-bar-container">
      <div class="loading-bar" id="loading-bar"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SCREEN 2: PASSWORD GATE                    -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="password-screen" class="screen">
    <div class="password-card">
      <div class="password-icon-container">
        <svg class="crystal-ball-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="ballGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#fff" stop-opacity="0.8" />
              <stop offset="100%" stop-color="#9d6ebf" stop-opacity="0.2" />
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="2" result="coloredBlur" />
              <feMerge>
                <feMergeNode in="coloredBlur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <!-- Base -->
          <path d="M35 105 L65 105 Q70 105 70 110 L30 110 Q30 105 35 105 Z" fill="#A8720A" />
          <path d="M40 95 L60 95 L65 105 L35 105 Z" fill="#C4913A" />
          <!-- Ball Glass -->
          <circle class="ball-bg" cx="50" cy="55" r="42" fill="#4B3067" />
          <circle class="ball-overlay" cx="50" cy="55" r="42" fill="url(#ballGlow)" />
          <!-- Floating particles inside -->
          <g class="particles">
            <circle cx="50" cy="55" r="1.5" fill="#fff" class="p1" filter="url(#glow)" />
            <circle cx="30" cy="45" r="2" fill="#fff" class="p2" filter="url(#glow)" />
            <circle cx="70" cy="65" r="1.8" fill="#fff" class="p3" filter="url(#glow)" />
          </g>
          <!-- Stars -->
          <path d="M50 35 L52 40 L57 42 L52 44 L50 49 L48 44 L43 42 L48 40 Z" fill="#FFD700" class="star-s1" />
          <path d="M35 65 L36 68 L39 69 L36 70 L35 73 L34 70 L31 69 L34 68 Z" fill="#FFD700" class="star-s2" />
        </svg>
      </div>
      <h2 class="password-title">This gift is locked</h2>
      <p class="password-subtitle">Enter the secret code to open it</p>
      <input type="password" id="password-input" class="password-input" placeholder="· · · · · · ·" maxlength="30"
        autocomplete="off">
      <button id="password-btn" class="password-btn">OPEN GIFT</button>
      <p class="password-error" id="password-error"></p>

      <!-- Password Hint Note Scrap -->
      <div id="password-hint-container" class="hidden">
        <div class="hint-scrap">
          <span class="hint-label">Hint:</span>
          <span class="hint-text" id="password-hint-text"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════ -->
  <!-- SCREEN 3: MAIN MENU                        -->
  <!-- ═══════════════════════════════════════════ -->
  <div id="menu-screen" class="screen">
    <!-- ── Layer 0: Background image (slight drift) -->
    <div class="parallax-layer layer-bg" data-depth="0.03"></div>

    <!-- ── Layer 1: God Rays (animated diagonal light) -->
    <div class="parallax-layer layer-rays" data-depth="0.05">
      <div class="god-ray ray-1"></div>
      <div class="god-ray ray-2"></div>
      <div class="god-ray ray-3"></div>
    </div>

    <!-- ── Layer 2: Floating petal / dust particles -->
    <div class="parallax-layer layer-petals" data-depth="0.08" id="petal-container"></div>

    <!-- ── Layer 3: Menu Icons + Wooden Sign -->
    <div class="parallax-layer layer-menu" data-depth="0.14">

      <!-- Wooden Name Sign -->
      <div class="wood-sign-block">
        <img src="assets/wood_sign.webp" class="wood-sign-img" alt="Sign">
        <div class="wood-sign-text">
          <span class="wood-sign-label" id="menu-recipient-name">For You, Always</span>
        </div>
      </div>

      <!-- Menu Grid — Organic stepping-stone layout -->
      <div class="menu-items">
        <div class="menu-items">
          <div class="menu-item row-1" data-room="music" id="item-music">
            <div class="menu-icon-wrap">
              <img src="assets/icons/gramophone.webp" class="menu-icon" alt="Music">
            </div>
            <span class="item-label">MUSIC</span>
          </div>
          <div class="menu-item row-1" data-room="journey" id="item-journey">
            <div class="menu-icon-wrap">
              <img src="assets/icons/hourglass.webp" class="menu-icon" alt="Journey">
            </div>
            <span class="item-label">JOURNEY</span>
          </div>
          <div class="menu-item row-1" data-room="moments" id="item-moments">
            <div class="menu-icon-wrap">
              <img src="assets/icons/camera.webp" class="menu-icon" alt="Moments">
            </div>
            <span class="item-label">MOMENTS</span>
          </div>
          <div class="menu-item row-1" data-room="quiz" id="item-quiz">
            <div class="menu-icon-wrap">
              <img src="assets/icons/quiz.webp" class="menu-icon menu-icon-emoji" alt="Quiz">
            </div>
            <span class="item-label">QUIZ</span>
          </div>
          <div class="menu-item row-2" data-room="Atlas-Of-Us" id="item-atlas">
            <div class="menu-icon-wrap">
              <img src="assets/icons/globe.webp" class="menu-icon" alt="Atlas">
            </div>
            <span class="item-label">ATLAS</span>
          </div>
          <div class="menu-item row-2" data-room="star-catcher" id="item-catcher">
            <div class="menu-icon-wrap">
              <img src="assets/icons/star.webp" class="menu-icon" alt="Catcher">
            </div>
            <span class="item-label">CATCHER</span>
          </div>
          <div class="menu-item row-2" data-room="fortune-cookie" id="item-fortune">
            <div class="menu-icon-wrap">
              <img src="assets/icons/fortune.webp" class="menu-icon menu-icon-emoji" alt="Fortune">
            </div>
            <span class="item-label">FORTUNE</span>
          </div>
          <div class="menu-item row-2" data-room="things-i-love" id="item-things">
            <div class="menu-icon-wrap">
              <img src="assets/icons/flower.webp" class="menu-icon menu-icon-emoji" alt="Things">
            </div>
            <span class="item-label">THINGS</span>
          </div>
          <div class="menu-item row-2" data-room="bucket-list" id="item-bucket">
            <div class="menu-icon-wrap">
              <img src="assets/icons/scroll.webp" class="menu-icon" alt="Bucket">
            </div>
            <span class="item-label">BUCKET</span>
          </div>
          <div class="menu-item row-2" data-room="message" id="item-message">
            <div class="menu-icon-wrap">
              <img src="assets/icons/envelope.webp" class="menu-icon" alt="Message">
            </div>
            <span class="item-label">MESSAGE</span>
          </div>
        </div>


      </div>
    </div>

    <!-- ═══════════════════════════════════════════ -->
    <!-- MODAL: ROOM POP-UP                         -->
    <!-- ═══════════════════════════════════════════ -->
    <div id="room-modal" class="modal-overlay">
      <div class="modal-content">
        <button id="modal-close" class="modal-close-btn">&times;</button>
        <iframe id="music-iframe" src="about:blank" frameborder="0" style="display: none;"></iframe>
        <iframe id="room-iframe" src="about:blank" frameborder="0"></iframe>
      </div>
    </div>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
